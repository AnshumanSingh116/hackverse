<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hackverse '26 — Sign In</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
   <link rel="icon" type="image/png" href="logo.png" />
</head>
<body data-page="login">

  <!-- Loading -->
  <div id="loading-screen">
    <div class="loader-text">HACKVERSE</div>
    <div class="loader-bar"><div class="loader-fill"></div></div>
    <span style="font-family:'Rajdhani',sans-serif;font-size:0.7rem;font-weight:600;letter-spacing:0.18em;text-transform:uppercase;color:var(--text-muted);margin-top:0.5rem">Checking session…</span>
  </div>

  <div class="page">
    <div class="card">

      <!-- Brand -->
      <div class="brand">
      <img src="logo.png" alt="Decagon Logo" class="nav-logo">
        <div>
          <span class="brand-name">Hackverse</span>
          <span class="brand-tag">DECAGON '26</span>
        </div>
      </div>

      <h1 style="margin-bottom:0.4rem">Sign In</h1>
      <div style="font-size:0.65rem;font-family:var(--font-mono);color:var(--accent);letter-spacing:0.12em;margin-bottom:0.65rem;text-transform:uppercase">DECAGON '26 · HACKVERSE</div>
      <p style="margin-bottom:2rem">Enter your team credentials to access the quiz portal.</p>

      <div id="alert-box"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="svis-aay@decagon.com" required autocomplete="username" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn btn-primary btn-full" style="margin-top:0.5rem">
          <div class="spinner hidden" id="btn-spinner"></div>
          <span id="btn-text">Sign In</span>
        </button>
      </form>

      <hr class="divider" />
      <p class="text-center" style="font-size:0.76rem; color:var(--text3); font-family:var(--font-mono)">
        ADMIN — sign in with @admin.com account<br>
        TEAMS — use credentials from your examiner
      </p>
    </div>
  </div>

  <script src="timegate.js"></script>
  <script src="app.js"></script>
</body>
</html>
